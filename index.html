const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(){
  const err = document.getElementById('err');
  const btn = document.getElementById('go');
  const pw = document.getElementById('pw').value;
  if(!pw){ err.textContent = 'Enter the passphrase.'; return; }
  btn.disabled = true; err.textContent = 'Decrypting…';
  try{
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(DATA.salt), iterations:DATA.iter, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(DATA.iv)}, key, b64(DATA.ct));
    const htmlText = new TextDecoder().decode(pt);
    document.open(); document.write(htmlText); document.close();
  }catch(e){
    btn.disabled = false;
    err.textContent = 'Wrong passphrase.';
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
